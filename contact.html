<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

  <body class="bg-dark text-white py-5 min-vh-100">
    

        <h1 class="text-center display-1 mb-4">Kontakt</h1>

        <div class="d-flex justify-content-center">
            <form class="w-100" style="max-width: 520px;">
                <div class="col-12 col-md-15 mb-3">
                    <label for="name" class="form-label">Namn</label>
                    <input type="text" class="form-control" id="name" placeholder="" required>
                </div>

                <div class="col-12 col-md-15 mb-3">
                    <label for="exampleInputEmail1" class="form-label">E-post</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">Vi vissar inte din email till någon</div>

                </div>
                    <div class=" col-12 col-md-15 mb-3">
                        <div class="mb-3">
                            <label for="subject" class="form-label">ämne</label>
                            <input type="text" class="form-control" id="subject" placeholder="">
                        </div>
                    
                        <div>   

                            <label for="message" class="form-label ">Meddelande</label>
                            <textarea class="form-control" id="message" rows="2"></textarea>

                        </div>

                        <div class="col-12 col-md-15 mb-3">
                            <label for="mobil" class="form-label">Telefon (valfritt)</label>
                            <input type="tel" class="form-control" id="mobil" placeholder="">
                        </div>
                </div>
                   
                <div class="col-12 col-md-15 mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="exampleCheck1">
                    <label class="form-check-label" for="exampleCheck1">Check me out</label>
                </div>

                    <button type="submit" class="btn btn-primary w-10">Submit</button>
            </form>
        </div>
    </body>
</html>
